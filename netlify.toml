[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/ar/*"
  [headers.values]
    Content-Language = "ar"

[[headers]]
  for = "/"
  [headers.values]
    Content-Language = "en"

[[redirects]]
  from = "/ar"
  to = "/ar/"
  status = 301
  force = true